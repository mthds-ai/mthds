      - Registry Search: packages/registry-search.md
      - Registry Distribution Protocol: packages/registry-distribution.md
  - Reference:
    - Specification:
      - .mthds File Format: spec/mthds-format.md
      - METHODS.toml Format: spec/manifest-format.md
      - methods.lock Format: spec/lock-format.md
      - Namespace Resolution Rules: spec/namespace-resolution.md
    - CLI Reference: cli/index.md
    - Tooling:
      - Editor Support: tooling/editor-support.md
      - Formatting & Linting: tooling/formatting-linting.md
      - MTHDS JSON Schema: tooling/json-schema.md
  - Guides:
    - Write Your First Method: getting-started/first-method.md
    - Create a Package: guides/create-package.md
    - Use Dependencies: guides/use-dependencies.md
    - Discover Methods: guides/discover-methods.md
  - For Implementers:
    - Building a Runtime: implementers/runtime.md
    - Validation Rules: implementers/validation-rules.md
    - Package Loading: implementers/package-loading.md
    - Building Editor Support: implementers/editor-support.md
  - About:
    - Roadmap: about/roadmap.md
    - Contributing to MTHDS: about/contributing.md
    - Contributing: contributing.md
    - Code of Conduct: CODE_OF_CONDUCT.md
    - License: license.md
    - Changelog: changelog.md
