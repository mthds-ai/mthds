site_name: MTHDS
site_url: https://mthds.ai/
site_description: "Official documentation for the MTHDS open standard."
docs_dir: docs
repo_url: "https://github.com/mthds-ai/mthds"
repo_name: "MTHDS on GitHub"
theme:
  name: material
  language: en
  custom_dir: docs/overrides
  favicon: images/favicon-32.png
  logo: images/favicon-32.png
  features:
    - navigation.footer
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
  - scheme: default          # light
    primary: custom
    accent: custom
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  - scheme: slate            # dark
    primary: custom
    accent: custom
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode

copyright: "© 2025-2026 Evotis S.A.S."

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mthds-ai/mthds
      name: MTHDS on GitHub
  generator: false
  version:
    provider: mike

plugins:
  - search
  - meta-manager
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom
  - llmstxt-md:
      sections:
        Home:
        - index.md: "Overview"
        - what-is-mthds/index.md: "What is MTHDS?"
        - about/philosophy.md: "Design Philosophy"
        - about/comparison-agent-skills.md: "Comparison with Agent Skills"
        - know-how-graph/index.md: "The Know-How Graph"
        The Language:
        - language/bundles.md: "Bundles"
        - language/concepts.md: "Concepts"
        - language/pipes-operators.md: "Pipes — Operators"
        - language/pipes-controllers.md: "Pipes — Controllers"
        - language/model-references.md: "Model References"
        - language/putting-it-all-together.md: "Putting It All Together"
        - language/domains.md: "Domains"
        - language/namespace-resolution.md: "Namespace Resolution"
        The Package System:
        - packages/structure.md: "Package Structure"
        - packages/manifest.md: "The Manifest"
        - packages/exports-visibility.md: "Exports & Visibility"
        - packages/dependencies.md: "Dependencies"
        - packages/cross-package-references.md: "Cross-Package References"
        - packages/lock-file.md: "The Lock File"
        - packages/distribution.md: "Distribution"
        - packages/version-resolution.md: "Version Resolution"
        - packages/registry.md: "The Registry"
        - packages/registry-indexing.md: "Registry Indexing"
        - packages/registry-search.md: "Registry Search"
        - packages/registry-distribution.md: "Registry Distribution Protocol"
        Reference:
        - spec/mthds-format.md: ".mthds File Format"
        - spec/manifest-format.md: "METHODS.toml Format"
        - spec/lock-format.md: "methods.lock Format"
        - spec/namespace-resolution.md: "Namespace Resolution Rules"
        - cli/index.md: "CLI Reference"
        - tooling/editor-support.md: "Editor Support"
        - tooling/formatting-linting.md: "Formatting & Linting"
        - tooling/json-schema.md: "MTHDS JSON Schema"
        Guides:
        - getting-started/first-method.md: "Write Your First Method"
        - guides/create-package.md: "Create a Package"
        - guides/use-dependencies.md: "Use Dependencies"
        - guides/discover-methods.md: "Discover Methods"
        For Implementers:
        - implementers/runtime.md: "Building a Runtime"
        - implementers/validation-rules.md: "Validation Rules"
        - implementers/package-loading.md: "Package Loading"
        - implementers/editor-support.md: "Building Editor Support"
        About:
        - about/roadmap.md: "Roadmap"
        - about/contributing.md: "Contributing to MTHDS"
        - contributing.md: "How to contribute"
        - CODE_OF_CONDUCT.md: "Code of Conduct"
        - license.md: "License information"
        - changelog.md: "Changelog"

markdown_extensions:
  - meta
  - sane_lists
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  
extra_css:
  - stylesheets/mermaid.css
  - stylesheets/general.css

nav:
  - Home:
    - Overview: index.md
    - What is MTHDS?: what-is-mthds/index.md
    - Design Philosophy: about/philosophy.md
    - Comparison with Agent Skills: about/comparison-agent-skills.md
    - The Know-How Graph: know-how-graph/index.md
  - The Language:
    - Bundles: language/bundles.md
    - Concepts: language/concepts.md
    - Pipes — Operators: language/pipes-operators.md
    - Pipes — Controllers: language/pipes-controllers.md
    - Model References: language/model-references.md
    - Putting It All Together: language/putting-it-all-together.md
    - Domains: language/domains.md
    - Namespace Resolution: language/namespace-resolution.md
  - The Package System:
    - Package Structure: packages/structure.md
    - The Manifest: packages/manifest.md
    - Exports & Visibility: packages/exports-visibility.md
    - Dependencies: packages/dependencies.md
    - Cross-Package References: packages/cross-package-references.md
    - The Lock File: packages/lock-file.md
    - Distribution: packages/distribution.md
    - Version Resolution: packages/version-resolution.md
    - The Registry:
      - Registry Overview: packages/registry.md
