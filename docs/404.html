<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://mthds.ai/latest/">
    <title>Page not found | MTHDS Documentation</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --panel: #ffffff;
            --text: #1a1a1a;
            --muted: #666666;
            --accent: #333333;
            --accent-hover: #000000;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --panel: #2a2a2a;
                --text: #f0f0f0;
                --muted: #999999;
                --accent: #cccccc;
                --accent-hover: #ffffff;
                --shadow: rgba(0, 0, 0, 0.35);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        main {
            max-width: 720px;
            padding: 32px;
            border-radius: 18px;
            background: var(--panel);
            box-shadow: 0 24px 80px var(--shadow);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.1;
        }

        p {
            margin: 0 0 12px;
            color: var(--muted);
            line-height: 1.6;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
        }

        .actions {
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--accent);
            color: var(--bg);
            font-weight: 600;
        }

        .button:hover {
            color: var(--bg);
            background: var(--accent-hover);
        }
    </style>
    <script>
        const path = window.location.pathname;
        // Get path segments (e.g., "/latest/foo/bar" → ["latest", "foo", "bar"])
        const segments = path.split('/').filter(seg => seg);
        const firstSegment = segments[0];

        // Check if it's a version: "latest", "pre-release", or starts with "0." (e.g., "0.17")
        const hasVersion = firstSegment === 'latest' || firstSegment === 'pre-release' || (firstSegment && firstSegment.startsWith('0.'));

        // Check if we're on a version's root 404 page (exactly /{version}/404.html)
        const isVersionRoot404 = segments.length === 2 && segments[1] === '404.html';

        if (!hasVersion) {
            // No version in URL, redirect to /latest/...
            const newUrl = '/latest' + path + window.location.search + window.location.hash;
            window.location.replace(newUrl);
        } else if (isVersionRoot404 && firstSegment !== 'latest') {
            // We tried a version's 404.html but it doesn't exist (invalid version)
            // Fall back to /latest/404.html
            window.location.replace('/latest/404.html');
        } else if (!isVersionRoot404) {
            // Has version but not on 404 page, redirect to that version's styled 404 page
            const version404Url = '/' + firstSegment + '/404.html';
            window.location.replace(version404Url);
        }
    </script>
</head>
<body>
    <main>
        <h1>Page not found</h1>
        <p>The page you requested does not exist in this documentation version.</p>
        <p>If you followed an old link, the redirect rules may already have sent you to the closest matching page under <code>/latest/</code>.</p>
        <div class="actions">
            <a class="button" href="/latest/">Go to the latest docs</a>
        </div>
    </main>
    <noscript>
        <h1>Page not found</h1>
        <p>Enable JavaScript for automatic redirects, or go to <a href="/latest/">the documentation</a>.</p>
    </noscript>
</body>
</html>
